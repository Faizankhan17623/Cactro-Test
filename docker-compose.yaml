# Spins up Postgres + the API together for local development.
#   docker compose up --build
# The API ends up on http://localhost:5000, Postgres on localhost:5432.
#
# These credentials are for the local throwaway dev database only. Override them
# by exporting POSTGRES_USER / POSTGRES_PASSWORD before running compose if you like.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: releasecheck
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/releasecheck
      PGSSL: disable
      PORT: 5000
    ports:
      - '5000:5000'
    # Apply the schema, then start the server.
    command: sh -c "npm run migrate && npm start"

volumes:
  pgdata:
